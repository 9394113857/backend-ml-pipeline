name: ML Pipeline With Email Notifications

on:
workflow_dispatch:

jobs:
run-ml-pipeline:

```
runs-on: ubuntu-latest

steps:

  - name: 📦 Checkout Code
    uses: actions/checkout@v4

  - name: 🐍 Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: 📚 Install Dependencies
    run: |
      echo "Installing dependencies..."
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - name: 🚀 Run ML Pipeline
    env:
      EVENTS_DB_URL: ${{ secrets.EVENTS_DB_URL }}
      PRODUCT_DB_URL: ${{ secrets.PRODUCT_DB_URL }}
      RECO_DB_URL: ${{ secrets.RECO_DB_URL }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_CC: ${{ secrets.MAIL_CC }}

    run: |
      echo "========================================"
      echo "🚀 ML PIPELINE STARTED"
      echo "========================================"

      START_TIME=$(date)

      python pipeline/run_pipeline.py

      echo "========================================"
      echo "✅ ML PIPELINE COMPLETED"
      echo "========================================"

      echo "PIPELINE_TIME=$START_TIME" >> $GITHUB_ENV

  - name: 📧 Send Success Email
    if: success()
    uses: dawidd6/action-send-mail@v3
    with:
      server_address: smtp.gmail.com
      server_port: 465
      secure: true

      username: ${{ secrets.MAIL_USERNAME }}
      password: ${{ secrets.MAIL_PASSWORD }}

      to: ${{ secrets.MAIL_TO }}
      cc: ${{ secrets.MAIL_CC }}

      subject: "✅ ML Recommendation Pipeline Success"

      from: ${{ secrets.MAIL_USERNAME }}

      body: |
        🚀 ML Recommendation Pipeline Completed Successfully

        ========================================

        Repository:
        ${{ github.repository }}

        Branch:
        ${{ github.ref_name }}

        Commit:
        ${{ github.sha }}

        Trigger:
        ${{ github.event_name }}

        Started:
        ${{ env.PIPELINE_TIME }}

        Workflow Run:
        https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

        ========================================

        Operations Completed:

        ✅ Events fetched from Events DB

        ✅ Product data fetched

        ✅ Feature engineering executed

        ✅ User-product scoring completed

        ✅ Ranking generated

        ✅ Top-K recommendations generated

        ✅ Recommendations UPSERTED into database

        ✅ Workflow completed successfully

        ========================================

        Status:
        SUCCESS ✅

  - name: 📧 Send Failure Email
    if: failure()
    uses: dawidd6/action-send-mail@v3
    with:
      server_address: smtp.gmail.com
      server_port: 465
      secure: true

      username: ${{ secrets.MAIL_USERNAME }}
      password: ${{ secrets.MAIL_PASSWORD }}

      to: ${{ secrets.MAIL_TO }}
      cc: ${{ secrets.MAIL_CC }}

      subject: "❌ ML Recommendation Pipeline Failed"

      from: ${{ secrets.MAIL_USERNAME }}

      body: |
        ❌ ML Recommendation Pipeline Failed

        Repository:
        ${{ github.repository }}

        Branch:
        ${{ github.ref_name }}

        Commit:
        ${{ github.sha }}

        Trigger:
        ${{ github.event_name }}

        Workflow Run:
        https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

        Immediate investigation required.
```
