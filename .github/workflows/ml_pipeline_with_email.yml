name: ML Pipeline With Email

on:
workflow_dispatch:

jobs:
run-ml-pipeline:

```
runs-on: ubuntu-latest

steps:

  - name: 📦 Checkout code
    uses: actions/checkout@v3

  - name: 🐍 Setup Python 3.11
    uses: actions/setup-python@v4
    with:
      python-version: "3.11"

  - name: 📚 Install dependencies
    run: |
      pip install --upgrade pip
      pip install -r requirements.txt

  - name: 🚀 Run ML Pipeline
    env:
      EVENTS_DB_URL: ${{ secrets.EVENTS_DB_URL }}
      PRODUCT_DB_URL: ${{ secrets.PRODUCT_DB_URL }}
      RECO_DB_URL: ${{ secrets.RECO_DB_URL }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_CC: ${{ secrets.MAIL_CC }}

    run: |
      echo "========================================"
      echo "🚀 ML PIPELINE STARTED"
      echo "========================================"

      python pipeline/run_pipeline.py

      echo "========================================"
      echo "🎉 ML PIPELINE COMPLETED"
      echo "========================================"

  - name: 📧 Send Success Email
    if: success()
    uses: dawidd6/action-send-mail@v3
    with:
      server_address: smtp.gmail.com
      server_port: 465
      secure: true

      username: ${{ secrets.MAIL_USERNAME }}
      password: ${{ secrets.MAIL_PASSWORD }}

      subject: "✅ ML Pipeline Success"

      to: ${{ secrets.MAIL_TO }}
      cc: ${{ secrets.MAIL_CC }}

      from: GitHub Actions

      body: |
        🚀 ML Recommendation Pipeline Completed Successfully

        Repository:
        ${{ github.repository }}

        Branch:
        ${{ github.ref_name }}

        Commit:
        ${{ github.sha }}

        Trigger:
        ${{ github.event_name }}

        Run URL:
        https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

        Status:
        SUCCESS ✅

  - name: 📧 Send Failure Email
    if: failure()
    uses: dawidd6/action-send-mail@v3
    with:
      server_address: smtp.gmail.com
      server_port: 465
      secure: true

      username: ${{ secrets.MAIL_USERNAME }}
      password: ${{ secrets.MAIL_PASSWORD }}

      subject: "❌ ML Pipeline Failed"

      to: ${{ secrets.MAIL_TO }}
      cc: ${{ secrets.MAIL_CC }}

      from: GitHub Actions

      body: |
        ❌ ML Recommendation Pipeline Failed

        Repository:
        ${{ github.repository }}

        Branch:
        ${{ github.ref_name }}

        Commit:
        ${{ github.sha }}

        Trigger:
        ${{ github.event_name }}

        Run URL:
        https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
```
