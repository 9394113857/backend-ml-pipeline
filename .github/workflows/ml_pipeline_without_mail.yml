# =====================================================
# WORKFLOW NAME
# =====================================================
name: ML Recommendation Pipeline No Mail

# =====================================================
# TRIGGERS
# =====================================================
on:
  workflow_dispatch:

  # Runs daily at 4:00 AM IST (10:30 PM UTC)
  schedule:
    - cron: "30 22 * * *"

  push:
    branches:
      - main

# =====================================================
# JOBS
# =====================================================
jobs:
  recommendation-pipeline:

    # GitHub-hosted Ubuntu runner
    runs-on: ubuntu-latest

    steps:

      # =====================================================
      # STEP 1: CHECKOUT CODE
      # =====================================================
      - name: 📦 Checkout Code
        uses: actions/checkout@v3

      # =====================================================
      # STEP 2: SETUP PYTHON
      # =====================================================
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # =====================================================
      # STEP 3: INSTALL DEPENDENCIES
      # =====================================================
      - name: 📚 Install Dependencies
        run: |
          echo "Installing dependencies..."
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "Dependencies installed successfully"

      # =====================================================
      # STEP 4: RUN ML PIPELINE
      # =====================================================
      - name: 🚀 Run Recommendation Pipeline
        env:
          # ✅ FIXED VARIABLE NAMES (MATCH PYTHON CODE)
          EVENTS_DB_URL: ${{ secrets.EVENTS_DB_URL }}
          PRODUCT_DB_URL: ${{ secrets.PRODUCT_DB_URL }}
          RECO_DB_URL: ${{ secrets.RECO_DB_URL }}

        run: |
          echo "🚀 Starting ML pipeline..."

          # Debug (optional - can remove later)
          echo "Checking env variables..."
          if [ -z "$EVENTS_DB_URL" ]; then echo "❌ EVENTS_DB_URL missing"; exit 1; fi
          if [ -z "$PRODUCT_DB_URL" ]; then echo "❌ PRODUCT_DB_URL missing"; exit 1; fi
          if [ -z "$RECO_DB_URL" ]; then echo "❌ RECO_DB_URL missing"; exit 1; fi

          echo "✅ All env variables present"

          python pipeline/run_pipeline.py

          echo "🎉 Pipeline execution completed successfully"
