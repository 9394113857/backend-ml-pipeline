# =====================================================
# WORKFLOW NAME
# =====================================================
name: ML Recommendation Pipeline (Manual Only)

# =====================================================
# TRIGGER (ONLY MANUAL)
# =====================================================
on:
  workflow_dispatch:

# =====================================================
# JOBS
# =====================================================
jobs:
  recommendation-pipeline:

    runs-on: ubuntu-latest

    steps:

      # =====================================================
      # STEP 1: CHECKOUT CODE
      # =====================================================
      - name: 📦 Checkout Code
        uses: actions/checkout@v3

      # =====================================================
      # STEP 2: SETUP PYTHON
      # =====================================================
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # =====================================================
      # STEP 3: INSTALL DEPENDENCIES
      # =====================================================
      - name: 📚 Install Dependencies
        run: |
          echo "📦 Installing dependencies..."
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Dependencies installed"

      # =====================================================
      # STEP 4: RUN ML PIPELINE
      # =====================================================
      - name: 🚀 Run Recommendation Pipeline
        env:
          EVENTS_DB_URL: ${{ secrets.EVENTS_DB_URL }}
          PRODUCT_DB_URL: ${{ secrets.PRODUCT_DB_URL }}
          RECO_DB_URL: ${{ secrets.RECO_DB_URL }}

        run: |
          echo "========================================"
          echo "🚀 ML PIPELINE STARTED"
          echo "========================================"
          date

          # 🔍 Validate environment variables
          echo "🔍 Validating environment variables..."

          if [ -z "$EVENTS_DB_URL" ]; then
            echo "❌ EVENTS_DB_URL missing"
            exit 1
          fi

          if [ -z "$PRODUCT_DB_URL" ]; then
            echo "❌ PRODUCT_DB_URL missing"
            exit 1
          fi

          if [ -z "$RECO_DB_URL" ]; then
            echo "❌ RECO_DB_URL missing"
            exit 1
          fi

          echo "✅ All environment variables are set"

          echo "----------------------------------------"
          echo "⚙️ Running ML pipeline script..."
          echo "----------------------------------------"

          python pipeline/run_pipeline.py

          echo "----------------------------------------"
          echo "🎉 ML PIPELINE COMPLETED SUCCESSFULLY"
          echo "----------------------------------------"
          date
