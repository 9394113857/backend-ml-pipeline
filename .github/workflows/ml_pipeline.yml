```
runs-on: ubuntu-latest

steps:

  - name: 📦 Checkout code
    uses: actions/checkout@v3

  - name: 🐍 Setup Python 3.11
    uses: actions/setup-python@v4
    with:
      python-version: "3.11"

  - name: 📚 Install dependencies
    run: |
      echo "Installing dependencies..."
      pip install --upgrade pip
      pip install -r requirements.txt
      echo "Dependencies installed"

  - name: 🚀 Run ML Pipeline
    env:
      EVENTS_DB_URL: ${{ secrets.EVENTS_DB_URL }}
      PRODUCT_DB_URL: ${{ secrets.PRODUCT_DB_URL }}
      RECO_DB_URL: ${{ secrets.RECO_DB_URL }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_CC: ${{ secrets.MAIL_CC }}

    run: |
      echo "Starting ML pipeline..."
      python pipeline/run_pipeline.py
      echo "Pipeline execution completed"

  - name: 📧 Send Test Success Email
    if: success()
    uses: dawidd6/action-send-mail@v3
    with:
      server_address: smtp.gmail.com
      server_port: 465
      secure: true
      username: ${{ secrets.MAIL_USERNAME }}
      password: ${{ secrets.MAIL_PASSWORD }}

      subject: ML Pipeline Success Test

      to: ${{ secrets.MAIL_TO }}
      cc: ${{ secrets.MAIL_CC }}

      body: |
        ML Recommendation Pipeline completed successfully.

        This is a test email from GitHub Actions.

        Repository: ${{ github.repository }}
        Branch: ${{ github.ref_name }}
```
